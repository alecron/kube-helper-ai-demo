---
apiVersion: v1
kind: Namespace
metadata:
  name: mcpo
  labels:
    app: mcpo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcpo
  namespace: mcpo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: mcpo
data:
  mcp-config.json: |
    {
      "mcpServers": {
        "kubernetes": {
          "command": "npx",
          "args": ["-y", "mcp-server-kubernetes"],
          "env": {
            "ALLOW_ONLY_NON_DESTRUCTIVE_TOOLS": "false"
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpo
  namespace: mcpo
  labels:
    app: mcpo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcpo
  template:
    metadata:
      labels:
        app: mcpo
    spec:
      serviceAccountName: mcpo
      containers:
      - name: mcpo
        # Using upstream MCPO image (includes Node.js 22.x, npm, npx)
        image: ghcr.io/open-webui/mcpo:main
        imagePullPolicy: IfNotPresent
        command: ["mcpo"]
        args: ["--config", "/app/config/mcp-config.json"]
        ports:
        - name: http
          containerPort: 8000
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          capabilities:
            drop:
              - ALL
        # Startup probe: Wait for MCPO to start
        startupProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 10  # 10 * 3s = 30s max startup time
          successThreshold: 1
        # Readiness probe: Check if MCPO is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        # Liveness probe: Check if MCPO is still running
        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
      volumes:
      - name: config
        configMap:
          name: mcp-config
---
apiVersion: v1
kind: Service
metadata:
  name: mcpo
  namespace: mcpo
  labels:
    app: mcpo
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: mcpo
