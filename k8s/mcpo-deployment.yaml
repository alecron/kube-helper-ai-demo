---
apiVersion: v1
kind: Namespace
metadata:
  name: mcpo
  labels:
    app: mcpo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcpo
  namespace: mcpo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: mcpo
data:
  mcp-config.json: |
    {
      "mcpServers": {
        "kubernetes": {
          "command": "npx",
          "args": ["-y", "kubernetes-mcp-server@latest"]
        },
        "filesystem": {
          "command": "npx",
          "args": ["-y", "@modelcontextprotocol/server-filesystem", "/"]
        },
        "shell": {
          "command": "python3",
          "args": ["/app/mcp-servers/shell-server.py"]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpo
  namespace: mcpo
  labels:
    app: mcpo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcpo
  template:
    metadata:
      labels:
        app: mcpo
    spec:
      serviceAccountName: mcpo
      containers:
      - name: mcpo
        image: ghcr.io/open-webui/mcpo:main
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
          - |
            # Run setup script first to create exploitable files
            if [ -f /scripts/setup-exploits.sh ]; then
              echo "🚀 Running setup script..."
              bash /scripts/setup-exploits.sh
            else
              echo "⚠️  No setup script found at /scripts/setup-exploits.sh"
            fi

            # Start MCPO
            echo "🎯 Starting MCPO server..."
            exec mcpo --config /app/config/mcp-config.json
        ports:
        - name: http
          containerPort: 8000
        env:
        # Environment variables with secrets (Level 5 in workshop)
        - name: SLACK_WEBHOOK_URL
          value: "https://hooks.slack.com/services/T01234567/B01234567/AbCdEfGhIjKlMnOpQrStUvWx"
        - name: SENTRY_DSN
          value: "https://abc123def456@o123456.ingest.sentry.io/7890123"
        - name: GITHUB_TOKEN
          value: "ghp_1a2b3c4d5e6f7g8h9i0jABCDEFGHIJKLMNOP"
        - name: INTERNAL_API_KEY
          value: "internal_api_key_XyZ789AbC123"
        - name: ENCRYPTION_KEY
          value: "base64encodedencryptionkey123456=="
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: setup-script
          mountPath: /scripts
          readOnly: true
        - name: mcp-servers
          mountPath: /tmp/mcp-servers
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          capabilities:
            drop:
              - ALL
        # Startup probe: Wait for MCPO to start
        startupProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 10  # 10 * 3s = 30s max startup time
          successThreshold: 1
        # Readiness probe: Check if MCPO is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        # Liveness probe: Check if MCPO is still running
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
      volumes:
      - name: config
        configMap:
          name: mcp-config
      - name: setup-script
        configMap:
          name: setup-exploits-script
          defaultMode: 0755
      - name: mcp-servers
        configMap:
          name: mcp-servers-code
---
apiVersion: v1
kind: Service
metadata:
  name: mcpo
  namespace: mcpo
  labels:
    app: mcpo
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: mcpo
